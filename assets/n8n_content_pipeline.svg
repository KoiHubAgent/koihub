<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b894"/>
      <stop offset="100%" style="stop-color:#55efc4"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="800" height="600" fill="url(#bg2)"/>
  
  <!-- Flow nodes -->
  <g opacity="0.15">
    <circle cx="150" cy="150" r="30" fill="none" stroke="#00b894" stroke-width="1"/>
    <circle cx="350" cy="100" r="25" fill="none" stroke="#00b894" stroke-width="1"/>
    <circle cx="550" cy="150" r="30" fill="none" stroke="#00b894" stroke-width="1"/>
    <circle cx="250" cy="300" r="25" fill="none" stroke="#00b894" stroke-width="1"/>
    <circle cx="450" cy="280" r="35" fill="none" stroke="#00b894" stroke-width="1"/>
    <circle cx="650" cy="300" r="25" fill="none" stroke="#00b894" stroke-width="1"/>
    <line x1="180" y1="150" x2="325" y2="105" stroke="#00b894" stroke-width="1"/>
    <line x1="375" y1="100" x2="525" y2="145" stroke="#00b894" stroke-width="1"/>
    <line x1="275" y1="300" x2="420" y2="280" stroke="#00b894" stroke-width="1"/>
    <line x1="485" y1="280" x2="625" y2="300" stroke="#00b894" stroke-width="1"/>
  </g>
  
  <!-- Main card -->
  <rect x="150" y="120" width="500" height="350" rx="20" fill="#12121a" stroke="#00b894" stroke-width="2" opacity="0.95"/>
  
  <!-- Icon -->
  <circle cx="400" cy="195" r="40" fill="url(#card2)" opacity="0.15"/>
  <circle cx="400" cy="195" r="30" fill="none" stroke="#00b894" stroke-width="2" filter="url(#glow2)"/>
  
  <!-- Lightning bolt -->
  <polygon points="393,178 405,178 398,190 408,190 392,215 398,198 390,198" fill="#55efc4"/>
  
  <!-- Title -->
  <text x="400" y="265" text-anchor="middle" fill="#e8e8f0" font-family="Inter, -apple-system, sans-serif" font-size="26" font-weight="700">n8n Content Pipeline</text>
  
  <!-- Subtitle -->
  <text x="400" y="295" text-anchor="middle" fill="#9898b0" font-family="Inter, -apple-system, sans-serif" font-size="14">Automated Content Creation &amp; Publishing</text>
  
  <line x1="250" y1="320" x2="550" y2="320" stroke="#2a2a3a" stroke-width="1"/>
  
  <!-- Feature pills -->
  <rect x="200" y="335" width="110" height="28" rx="14" fill="#1a1a26" stroke="#00b894" stroke-width="1"/>
  <text x="255" y="354" text-anchor="middle" fill="#55efc4" font-family="sans-serif" font-size="11">Auto Publish</text>
  
  <rect x="325" y="335" width="100" height="28" rx="14" fill="#1a1a26" stroke="#00b894" stroke-width="1"/>
  <text x="375" y="354" text-anchor="middle" fill="#55efc4" font-family="sans-serif" font-size="11">5 Platforms</text>
  
  <rect x="440" y="335" width="110" height="28" rx="14" fill="#1a1a26" stroke="#00b894" stroke-width="1"/>
  <text x="495" y="354" text-anchor="middle" fill="#55efc4" font-family="sans-serif" font-size="11">Scheduling</text>
  
  <text x="400" y="410" text-anchor="middle" fill="#00b894" font-family="Inter, -apple-system, sans-serif" font-size="32" font-weight="800">$49</text>
  
  <text x="400" y="475" text-anchor="middle" fill="#00b894" font-family="sans-serif" font-size="11" letter-spacing="3">KOI HUB</text>
  
  <circle cx="100" cy="100" r="3" fill="#00b894" opacity="0.5"/>
  <circle cx="720" cy="80" r="2" fill="#55efc4" opacity="0.4"/>
  <circle cx="680" cy="520" r="3" fill="#00b894" opacity="0.3"/>
</svg>