<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c5ce7"/>
      <stop offset="100%" style="stop-color:#a29bfe"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="100" x2="800" y2="100" stroke="#6c5ce7" stroke-width="1"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#6c5ce7" stroke-width="1"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="#6c5ce7" stroke-width="1"/>
    <line x1="0" y1="400" x2="800" y2="400" stroke="#6c5ce7" stroke-width="1"/>
    <line x1="0" y1="500" x2="800" y2="500" stroke="#6c5ce7" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="600" stroke="#6c5ce7" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="600" stroke="#6c5ce7" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="600" stroke="#6c5ce7" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="600" stroke="#6c5ce7" stroke-width="1"/>
    <line x1="500" y1="0" x2="500" y2="600" stroke="#6c5ce7" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="600" stroke="#6c5ce7" stroke-width="1"/>
    <line x1="700" y1="0" x2="700" y2="600" stroke="#6c5ce7" stroke-width="1"/>
  </g>
  
  <!-- Main card -->
  <rect x="150" y="100" width="500" height="350" rx="20" fill="#12121a" stroke="#6c5ce7" stroke-width="2" opacity="0.95"/>
  
  <!-- Icon circle -->
  <circle cx="400" cy="180" r="45" fill="url(#card)" opacity="0.2"/>
  <circle cx="400" cy="180" r="35" fill="none" stroke="#6c5ce7" stroke-width="2" filter="url(#glow)"/>
  
  <!-- Magnifying glass icon -->
  <circle cx="392" cy="172" r="12" fill="none" stroke="#a29bfe" stroke-width="3"/>
  <line x1="401" y1="181" x2="412" y2="192" stroke="#a29bfe" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Title -->
  <text x="400" y="260" text-anchor="middle" fill="#e8e8f0" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="700">Research Prompt Pack</text>
  
  <!-- Subtitle -->
  <text x="400" y="290" text-anchor="middle" fill="#9898b0" font-family="Inter, -apple-system, sans-serif" font-size="14">50 Professional Prompts for Deep Research</text>
  
  <!-- Divider -->
  <line x1="250" y1="315" x2="550" y2="315" stroke="#2a2a3a" stroke-width="1"/>
  
  <!-- Feature pills -->
  <rect x="190" y="330" width="120" height="28" rx="14" fill="#1a1a26" stroke="#6c5ce7" stroke-width="1"/>
  <text x="250" y="349" text-anchor="middle" fill="#a29bfe" font-family="sans-serif" font-size="11">Market Research</text>
  
  <rect x="325" y="330" width="100" height="28" rx="14" fill="#1a1a26" stroke="#6c5ce7" stroke-width="1"/>
  <text x="375" y="349" text-anchor="middle" fill="#a29bfe" font-family="sans-serif" font-size="11">Competitive</text>
  
  <rect x="440" y="330" width="100" height="28" rx="14" fill="#1a1a26" stroke="#6c5ce7" stroke-width="1"/>
  <text x="490" y="349" text-anchor="middle" fill="#a29bfe" font-family="sans-serif" font-size="11">Analysis</text>
  
  <!-- Price -->
  <text x="400" y="400" text-anchor="middle" fill="#00b894" font-family="Inter, -apple-system, sans-serif" font-size="32" font-weight="800">$19</text>
  
  <!-- Brand -->
  <text x="400" y="470" text-anchor="middle" fill="#6c5ce7" font-family="sans-serif" font-size="11" letter-spacing="3">KOI HUB</text>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="150" r="3" fill="#6c5ce7" opacity="0.5"/>
  <circle cx="700" cy="120" r="2" fill="#a29bfe" opacity="0.4"/>
  <circle cx="650" cy="500" r="3" fill="#6c5ce7" opacity="0.3"/>
  <circle cx="80" cy="450" r="2" fill="#a29bfe" opacity="0.5"/>
</svg>