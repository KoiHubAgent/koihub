<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="card3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fdcb6e"/>
      <stop offset="100%" style="stop-color:#ffeaa7"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="800" height="600" fill="url(#bg3)"/>
  
  <!-- Circuit pattern -->
  <g opacity="0.08">
    <rect x="100" y="120" width="60" height="40" rx="5" fill="none" stroke="#fdcb6e" stroke-width="1"/>
    <rect x="250" y="80" width="80" height="30" rx="5" fill="none" stroke="#fdcb6e" stroke-width="1"/>
    <rect x="500" y="100" width="70" height="35" rx="5" fill="none" stroke="#fdcb6e" stroke-width="1"/>
    <rect x="650" y="130" width="50" height="50" rx="5" fill="none" stroke="#fdcb6e" stroke-width="1"/>
    <line x1="160" y1="140" x2="250" y2="95" stroke="#fdcb6e" stroke-width="1"/>
    <line x1="330" y1="95" x2="500" y2="117" stroke="#fdcb6e" stroke-width="1"/>
    <circle cx="400" cy="80" r="4" fill="#fdcb6e"/>
    <circle cx="200" cy="180" r="3" fill="#fdcb6e"/>
    <circle cx="600" cy="90" r="3" fill="#fdcb6e"/>
  </g>
  
  <!-- Main card -->
  <rect x="150" y="120" width="500" height="350" rx="20" fill="#12121a" stroke="#fdcb6e" stroke-width="2" opacity="0.95"/>
  
  <!-- Icon -->
  <circle cx="400" cy="195" r="40" fill="url(#card3)" opacity="0.15"/>
  <circle cx="400" cy="195" r="30" fill="none" stroke="#fdcb6e" stroke-width="2" filter="url(#glow3)"/>
  
  <!-- Robot head -->
  <rect x="385" y="178" width="30" height="22" rx="4" fill="none" stroke="#ffeaa7" stroke-width="2"/>
  <circle cx="392" cy="187" r="3" fill="#ffeaa7"/>
  <circle cx="408" cy="187" r="3" fill="#ffeaa7"/>
  <line x1="390" y1="173" x2="390" y2="178" stroke="#ffeaa7" stroke-width="2"/>
  <line x1="410" y1="173" x2="410" y2="178" stroke="#ffeaa7" stroke-width="2"/>
  <circle cx="390" cy="171" r="2" fill="#ffeaa7"/>
  <circle cx="410" cy="171" r="2" fill="#ffeaa7"/>
  
  <!-- Title -->
  <text x="400" y="265" text-anchor="middle" fill="#e8e8f0" font-family="Inter, -apple-system, sans-serif" font-size="26" font-weight="700">AI Agent Template</text>
  
  <!-- Subtitle -->
  <text x="400" y="295" text-anchor="middle" fill="#9898b0" font-family="Inter, -apple-system, sans-serif" font-size="14">Production-Ready Autonomous Agent</text>
  
  <line x1="250" y1="320" x2="550" y2="320" stroke="#2a2a3a" stroke-width="1"/>
  
  <!-- Feature pills -->
  <rect x="190" y="335" width="120" height="28" rx="14" fill="#1a1a26" stroke="#fdcb6e" stroke-width="1"/>
  <text x="250" y="354" text-anchor="middle" fill="#ffeaa7" font-family="sans-serif" font-size="11">Task Queue</text>
  
  <rect x="325" y="335" width="100" height="28" rx="14" fill="#1a1a26" stroke="#fdcb6e" stroke-width="1"/>
  <text x="375" y="354" text-anchor="middle" fill="#ffeaa7" font-family="sans-serif" font-size="11">Memory</text>
  
  <rect x="440" y="335" width="100" height="28" rx="14" fill="#1a1a26" stroke="#fdcb6e" stroke-width="1"/>
  <text x="490" y="354" text-anchor="middle" fill="#ffeaa7" font-family="sans-serif" font-size="11">Cron Jobs</text>
  
  <text x="400" y="410" text-anchor="middle" fill="#fdcb6e" font-family="Inter, -apple-system, sans-serif" font-size="32" font-weight="800">$99</text>
  
  <text x="400" y="475" text-anchor="middle" fill="#fdcb6e" font-family="sans-serif" font-size="11" letter-spacing="3">KOI HUB</text>
  
  <circle cx="90" cy="500" r="3" fill="#fdcb6e" opacity="0.5"/>
  <circle cx="730" cy="480" r="2" fill="#ffeaa7" opacity="0.4"/>
  <circle cx="120" cy="80" r="2" fill="#fdcb6e" opacity="0.3"/>
</svg>